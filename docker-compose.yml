# docker-compose.yml
#version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: beer_postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    restart: always

 ### Добавляем проверку здоровья для PostgreSQL ###
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  beer_backend_api:
    build: ./backend
    container_name: beer_backend_api
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_media_assets:/srv/beer-media-assets
    ports:
      - "8000:8000"
    env_file:
      ./.env
    environment:
      - MEDIA_STORAGE_ROOT=/srv/beer-media-assets
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/system/status', timeout=3)"
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  backend_media_assets:
